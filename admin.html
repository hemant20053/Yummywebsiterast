<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .login-box {
            width: 100%;
            max-width: 420px;
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .2);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #0d6efd;
            font-weight: bold;
        }

        .form-control {
            height: 50px;
        }

        .btn-login {
            width: 100%;
            height: 50px;
            font-size: 18px;
            font-weight: bold;
        }

        .logo {
            font-size: 60px;
            text-align: center;
            margin-bottom: 15px;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="login-box">

        <div class="logo">
            🔐
        </div>

        <h2>Admin Login</h2>

        <form action="check_login.php" method="POST">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" name="email" placeholder="Enter Username" required>
            </div>

            <div class="mb-3">

                <label>Password</label>

                <div class="input-group">

                    <input type="password" id="password" class="form-control" placeholder="Enter Password" name="pass"
                        required>

                    <button type="button" class="btn btn-outline-secondary" id="togglePassword">

                        <i class="fa-solid fa-eye"></i>

                    </button>

                </div>

            </div>

            <a href="forgotpassword.php">Forgot password</a>

            <button type="submit" class="btn btn-primary btn-login">
                Login
            </button>

        </form>

        <div class=" footer-text">
            © 2026 All Rights Reserved <br> Not a Member <button class="btn btn-link"
                onclick="location.href='signup.html'">signup</button>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const password = document.getElementById("password");
            const toggle = document.getElementById("togglePassword");

            if (password && toggle) {
                toggle.addEventListener("click", function () {
                    if (password.type === "password") {
                        password.type = "text";
                        this.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
                    } else {
                        password.type = "password";
                        this.innerHTML = '<i class="fa-solid fa-eye"></i>';
                    }
                });
            }

        });
    </script>

</body>

</html>
